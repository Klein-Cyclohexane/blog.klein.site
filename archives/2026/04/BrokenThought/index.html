# Title:Broken Thoughts
## Date:Fri 10th 2026
### Tag: Blog
*Move from Moments on April 8th*

I overdosed on Caffeine today.  

Thanks to the principal, I got to enjoy a latte at the school café at a ancy price plus two bottles of Starbucks.

Three years on, I feel the only thing I've truly mastered is social niceties. Whether sitting across from a high school student or an academician, I can start a coversation seamlessly   (~~零帧起手~~)，to the point that people label me "talkative". I can't help but recall how flustered I was during an interview in January 2023 facing another academician. Back then, every word I uttered felt like flower petals struck by raindrops, losing shape before they could even land. Every sentence got stuck in my throat; what came out were mere words, while the unfinished second half lingered unspoken. I suspected that others saw then was not a student, but a shapeless, limp exitence.  

Three years later, I've learned to be poised, to articulate complete logic fluently, and to *"I got you"* (~~as if possessed by GPT~~). I've wondered if I've truly become someone who enjoys socializing, yet every time I step away from such situations, I suddenly zone out, as if I don't recognize the voice that was speaking, and then I don't know where my voice cords are.

Perhaps this is a boomerage. The fact that I somehow *stood out* in that interview three years ago was probably not because my halting responses were fascinating, but because thte academician had grown tired of polished people and wanted to give a chance to something limp. Then I met more people and experienced more things, which perhaps forged this shell around me. 

Or maybe in another three years, my true self will finally fill out this sheell and grow into it.
   
> Like Bark and the Core of a Tree.
